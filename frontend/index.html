<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FileNix DMS</title>
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>📄</text></svg>" id="favicon" />
    <script>
      (function() {
        try {
          const savedTheme = localStorage.getItem('dms_theme_settings');
          if (savedTheme) {
            const theme = JSON.parse(savedTheme);
            if (theme.favicon) {
              const link = document.getElementById('favicon');
              if (link) {
                link.href = theme.favicon;
              }
            }
            const root = document.documentElement;
            const setVar = (k, v) => {
              if (v === undefined || v === null || v === '') return;
              root.style.setProperty(k, v);
            };

            setVar('--dms-primary', theme.primaryColor);
            setVar('--dms-secondary', theme.secondaryColor);
            setVar('--dms-accent', theme.accentColor);
            setVar('--dms-sidebar-bg', theme.sidebarBgColor);
            setVar('--dms-sidebar-text', theme.sidebarTextColor);
            setVar('--dms-tab-text', theme.tabTextColor);
            setVar('--dms-tab-active', theme.tabActiveColor);

            setVar('--dms-success', theme.successColor);
            setVar('--dms-warning', theme.warningColor);
            setVar('--dms-error', theme.errorColor);
            setVar('--dms-info', theme.infoColor);
            setVar('--dms-text-primary', theme.textPrimary);
            setVar('--dms-text-secondary', theme.textSecondary);
            setVar('--dms-text-muted', theme.textMuted);
            setVar('--dms-text-disabled', theme.textDisabled);
            setVar('--dms-border-light', theme.borderLight);
            setVar('--dms-border-medium', theme.borderMedium);
            setVar('--dms-border-dark', theme.borderDark);
            setVar('--dms-bg-card', theme.bgCard);
            setVar('--dms-bg-panel', theme.bgPanel);
            setVar('--dms-bg-hover', theme.bgHover);
            setVar('--dms-bg-selected', theme.bgSelected);

            setVar('--dms-login-bg-start', theme.loginBgGradientStart);
            setVar('--dms-login-bg-end', theme.loginBgGradientEnd);
            setVar('--dms-login-card-bg', theme.loginCardBg);
            setVar('--dms-login-card-shadow', theme.loginCardShadow);
            setVar('--dms-login-btn-bg', theme.loginButtonBg);
            setVar('--dms-login-btn-text', theme.loginButtonText);
            setVar('--dms-login-btn-hover', theme.loginButtonHover);
            setVar('--dms-login-accent-bg', theme.loginAccentBg);
            setVar('--dms-login-accent-icon', theme.loginAccentIcon);

            if (theme.bgImage) {
              setVar('--dms-bg-image', "url('" + theme.bgImage + "')");
              if (theme.mainBgColor) setVar('--dms-main-bg', theme.mainBgColor + 'cc');
            } else {
              setVar('--dms-bg-image', 'none');
              if (theme.mainBgColor) setVar('--dms-main-bg', theme.mainBgColor);
            }

            if (theme.fontFamily) {
              document.body.style.fontFamily = "'" + theme.fontFamily + "', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial";
            }
          }
          // Load custom title from company info
          const savedCompanyInfo = localStorage.getItem('dms_company_info');
          if (savedCompanyInfo) {
            const companyInfo = JSON.parse(savedCompanyInfo);
            if (companyInfo.companyName) {
              document.title = companyInfo.companyName + ' DMS';
            }
          }
        } catch (e) {
        }
      })();
    </script>
    <style>
      html, body {
        background-color: var(--dms-main-bg, #F5F7FA);
        background-image: var(--dms-bg-image, none);
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
